name: Cloud Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows Terminal
    runs-on: windows-2025-vs2026
    timeout-minutes: 180

    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[18.0,19.0)'

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          Import-Module .\tools\OpenConsole.psm1
          Set-MsBuildDevEnvironment
          .\dep\nuget\nuget.exe restore .\OpenConsole.slnx
          .\dep\nuget\nuget.exe restore .\dep\nuget\packages.config
          msbuild.exe .\OpenConsole.slnx /restore /m /p:Configuration=Debug /p:Platform=x64 /p:GenerateAppxPackageOnBuild=false /p:AppxBundle=false /bl:artifacts\build.binlog

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: artifacts
          if-no-files-found: warn

      - name: Upload binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-terminal-debug-x64
          path: |
            bin\x64\Debug
          if-no-files-found: warn
