name: Cloud Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Windows Terminal
    runs-on: windows-2025-vs2026
    timeout-minutes: 180

    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[18.0,19.0)'

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          .\build\scripts\Generate-ThirdPartyNotices.ps1 -MarkdownNoticePath .\NOTICE.md -OutputPath .\src\cascadia\CascadiaPackage\NOTICE.html
          .\dep\nuget\nuget.exe restore .\OpenConsole.slnx
          .\dep\nuget\nuget.exe restore .\dep\nuget\packages.config
          msbuild.exe .\OpenConsole.slnx /restore /m /t:"Terminal\CascadiaPackage" /p:Configuration=Release /p:Platform=x64 /p:WindowsTerminalBranding=Release /p:GenerateAppxPackageOnBuild=true /p:AppxBundle=Never /bl:artifacts\build.binlog

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $terminalPackage = Get-ChildItem -Recurse -Filter 'CascadiaPackage*.msix' | Select-Object -First 1
          if (-not $terminalPackage) {
            throw 'Could not find CascadiaPackage*.msix after build.'
          }

          $xamlAppx = Get-Item 'src\cascadia\CascadiaPackage\AppPackages\*\Dependencies\x64\Microsoft.UI.Xaml*.appx' | Select-Object -First 1
          if (-not $xamlAppx) {
            throw 'Could not find Microsoft.UI.Xaml dependency appx after build.'
          }

          $zip = & .\build\scripts\New-UnpackagedTerminalDistribution.ps1 `
            -TerminalAppX $terminalPackage.FullName `
            -XamlAppX $xamlAppx.FullName `
            -Destination artifacts

          $zip | Format-List FullName, Length
          Get-ChildItem artifacts -Recurse | Format-Table FullName, Length

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: artifacts
          if-no-files-found: warn

      - name: Upload portable ZIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-terminal-portable-x64
          path: |
            artifacts\*.zip
          if-no-files-found: error
